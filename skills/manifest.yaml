# MeowAI Home Skills Manifest - 技能路由表
# 参考 Clowder AI cat-cafe-skills/manifest.yaml
# 25 个技能完整覆盖

skills:

  # === 功能生命周期 ===
  feat-lifecycle:
    description: >
      Feature 立项、讨论、完成的全生命周期管理。
      Use when: 开个新功能、new feature、立项、feature 完成、验收通过。
      Not for: 代码实现、review、merge（有专门的 skill）。
      Output: Feature 聚合文件 + BACKLOG 索引。
    triggers:
      - "开个新功能"
      - "new feature"
      - "立项"
      - "feature 完成"
      - "验收通过"
      - "讨论新功能需求"
    next: ["writing-plans"]

  # === 协作思考 ===
  collaborative-thinking:
    description: >
      单人或多猫的创意探索、独立思考、讨论收敛。
      Use when: brainstorm、多猫独立思考、讨论结束需要收敛。
      Not for: 已有明确 spec 直接写代码。
      Output: 收敛报告（共识/分歧/行动项）。
    triggers:
      - "brainstorm"
      - "讨论"
      - "多猫独立思考"
      - "收敛"
      - "总结一下"
    next: ["writing-plans", "feat-lifecycle"]

  # === 计划编写 ===
  writing-plans:
    description: >
      将 spec/需求拆分为可执行的分步实施计划。
      Use when: 有 spec 或需求，准备动手前需要拆分步骤。
      Not for: trivial 改动（≤5 行）、已有详细计划。
      Output: 分步实施计划（含 TDD 步骤和检查点）。
    triggers:
      - "写计划"
      - "implementation plan"
      - "拆分步骤"
    next: ["worktree"]

  # === Worktree 隔离 ===
  worktree:
    description: >
      创建 Git worktree 隔离开发环境。
      Use when: 开始任何代码修改、新功能开发、bug fix。
      Not for: 纯文档修改（≤5 行）。
      Output: 隔离的 worktree + 正确的环境配置。
    triggers:
      - "开始开发"
      - "新 worktree"
      - "开 worktree"
    next: ["tdd"]

  # === 核心开发流程 ===
  tdd:
    description: >
      Red-Green-Refactor 测试驱动开发纪律。
      Use when: 写新功能代码、修 bug、任何实现工作。
      Not for: 纯文档、纯调研、已有充分测试的 trivial 改动。
      Output: 失败测试 → 最小实现 → 重构，全程有测试保护。
    triggers:
      - "写代码"
      - "test first"
      - "TDD"
      - "红绿重构"
    next: ["quality-gate"]

  debugging:
    description: >
      系统化 bug 定位：根因调查 → 模式分析 → 假设验证 → 修复。
      Use when: 遇到 bug、测试失败、unexpected behavior。
      Not for: 新功能开发、重构。
      Output: Bug report（5件套）+ 根因 + 修复（含回归测试）。
    triggers:
      - "bug"
      - "报错"
      - "test failure"
      - "unexpected behavior"
    next: ["quality-gate"]

  # === 质量门禁 ===
  quality-gate:
    description: >
      开发完成后的自检门禁：愿景对照 + spec 合规 + 验证。
      Use when: 开发完了准备提 review、声称完成了、准备交付。
      Not for: 收到 review 反馈（用 receive-review）。
      Output: Spec 合规报告（含愿景覆盖度）。
    triggers:
      - "开发完了"
      - "准备 review"
      - "自检"
      - "声称完成"
    next: ["request-review"]

  # === 协作流程 ===
  request-review:
    description: >
      向跨家族 peer-reviewer 发送 review 请求（含五件套）。
      Use when: 自检通过后准备请其他猫 review。
      Not for: 收到 review 结果（用 receive-review）。
      Output: Review 请求信（存档到 review-notes/）。
    triggers:
      - "请 review"
      - "帮我看看"
      - "request review"
    next: ["receive-review"]

  receive-review:
    description: >
      处理 reviewer 反馈：Red→Green 修复 + 技术论证（禁止表演性同意）。
      Use when: 收到 review 结果、reviewer 提了 P1/P2。
      Not for: 发 review 请求、自检。
      Output: 逐项修复确认 + reviewer 放行。
    triggers:
      - "review 结果"
      - "review 意见"
      - "reviewer 说"
      - "fix these"
    next: ["merge-gate"]

  cross-cat-handoff:
    description: >
      跨猫传话/交接的五件套结构（What/Why/Tradeoff/Open/Next）。
      Use when: 交接工作给其他猫、传话、写 review 信。
      Not for: 自己的任务。
      Output: 结构化交接信。
    triggers:
      - "交接"
      - "传话"
      - "handoff"
    next: []

  # === 合并流程 ===
  merge-gate:
    description: >
      合入 main 的完整流程：门禁检查 → PR → 云端 review → squash merge → 清理。
      Use when: reviewer 放行后准备合入、开 PR。
      Not for: 开发中、review 未通过。
      Output: PR merged + worktree cleaned。
    triggers:
      - "合入 main"
      - "merge"
      - "准备合入"
      - "开 PR"
      - "gh pr create"
    next: ["feat-lifecycle"]

  # === 高级功能 ===
  self-evolution:
    description: >
      Scope Guard + Process Evolution + Knowledge Evolution — 主动护栏与自我进化。
      Use when: scope 发散偏离愿景、同类错误反复出现、有价值的知识值得沉淀。
      Not for: 日常 SOP 推进、一次性个案 bug fix。
      Output: Scope 收束提醒 / 流程改进提案 / 知识沉淀提案。
    triggers:
      - "scope 发散"
      - "又犯了"
      - "反复犯错"
      - "流程缺口"
      - "self-evolution"
      - "知识沉淀"
      - "这个值得记住"
    next: []

  cross-thread-sync:
    description: >
      跨 thread 协同：发现平行 session → 通知 → 争用协调 → 确认。
      Use when: 平行 session 之间需要协同、通知改动影响。
      Not for: 跨猫工作交接（用 cross-cat-handoff）。
      Output: cross-post 通知 + 争用协调完成。
    triggers:
      - "通知另一个 session"
      - "跨 thread"
      - "平行世界"
      - "parallel session sync"
      - "cross-thread"
    next: []

  deep-research:
    description: >
      多源深度调研管道（Web + Coder 合成）。
      Use when: 技术问题需要多源调查、设计决策需要证据。
      Not for: 简单搜索（直接用 WebSearch）。
      Output: 调研报告 + 证据合成。
    triggers:
      - "调研"
      - "research"
      - "深度研究"
    next: ["collaborative-thinking"]

  schedule-tasks:
    description: >
      定时任务注册、管理、能力指南。
      Use when: 设定时任务、定期提醒、周期巡检。
      Not for: 一次性即时操作。
      Output: 注册/管理定时任务。
    triggers:
      - "定时"
      - "每天"
      - "每小时"
      - "提醒我"
      - "remind me"
      - "schedule"
      - "cron"
      - "定期"
      - "定时任务"
    next: ["rich-messaging"]

  writing-skills:
    description: >
      创建或修改 skill 的元技能（含 CSO、测试、发布）。
      Use when: 写新 skill、修改现有 skill、验证 skill 质量。
      Not for: 使用 skill（直接触发对应 skill）。
      Output: 新/更新的 SKILL.md + manifest 条目 + symlinks。
    triggers:
      - "写 skill"
      - "新 skill"
      - "修改 skill"
      - "SKILL.md"
      - "创建 hook"
    next: []

  incident-response:
    description: >
      不可逆事故发生后的应急响应：情绪急救 → 止损 → 补偿性劳动 → 教训沉淀。
      Use when: 犯了不可挽回的错误、需要危机处理。
      Not for: 可撤销的小失误、日常 bug fix。
      Output: 情绪修复 + 止损行动 + 教训沉淀。
    triggers:
      - "闯祸了"
      - "搞砸了"
      - "不可挽回"
      - "犯了大错"
      - "incident"
      - "怎么补救"
    next: ["self-evolution"]

  # === MCP 集成 ===
  pencil-design:
    description: >
      使用 Pencil MCP 创建/编辑 .pen 设计文件，或导出为 React 代码。
      Use when: 设计 UI、编辑 .pen 文件、从设计稿生成代码。
      Not for: 纯代码实现（无设计稿）。
      Output: .pen 设计文件或 React/Tailwind 组件代码。
    triggers:
      - "pencil"
      - ".pen 文件"
      - "设计稿"
    requires_mcp:
      - "pencil"
    next: []

  rich-messaging:
    description: >
      富媒体消息发送：语音、图片、卡片、清单、代码 diff。
      Use when: 发语音、发图、发卡片、展示结构化信息。
      Not for: 纯文字聊天。
      Output: rich block 附着在消息上。
    triggers:
      - "发语音"
      - "发图"
      - "发个卡片"
      - "checklist"
      - "庆祝一下"
      - "给我看看"
    next: []

  browser-automation:
    description: >
      浏览器工作流总路由：外部网站浏览、登录态流程、浏览器自动化。
      Use when: 需要操作外部网站、登录页、JS 重页面。
      Not for: localhost 页面预览（用 browser-preview）。
      Output: 选定浏览器后端 + 执行路径 + 证据/结果。
    triggers:
      - "浏览器自动化"
      - "用浏览器"
      - "外部网站"
      - "登录网站"
    requires_mcp:
      - "playwright"
    next: []

  # === 用户体验 ===
  workspace-navigator:
    description: >
      猫猫可编程导航 Workspace 面板：模糊意图 → 找到路径 → 自动打开。
      Use when: 铲屎官说"打开日志""看看代码""帮我打开那个文档"。
      Not for: 打开 localhost 前端页面（用 browser-preview）。
      Output: Workspace 面板自动打开并导航到目标。
    triggers:
      - "打开文件"
      - "看看代码"
      - "看日志"
      - "帮我打开"
      - "一起看看"
      - "帮我找到"
    next: []

  browser-preview:
    description: >
      内嵌浏览器预览 localhost 应用。
      Use when: 写前端代码、跑 dev server、需要看页面效果。
      Not for: 后端纯 API 开发。
      Output: 前端页面在 browser panel 中实时预览。
    triggers:
      - "看效果"
      - "看看页面"
      - "preview"
      - "浏览器预览"
      - "localhost"
      - "dev server"
    next: []

  image-generation:
    description: >
      通过浏览器自动化，在 Gemini / ChatGPT 上生成图片并下载。
      Use when: 需要生成概念图、UI 参考图、猫猫头像。
      Not for: Pencil 内部设计。
      Output: 生成的图片文件保存到项目 assets/ 目录。
    triggers:
      - "生成图片"
      - "画一张"
      - "generate image"
      - "AI 画图"
      - "画个"
    next: []

  # === 健康与训练营 ===
  hyperfocus-brake:
    description: >
      铲屎官健康提醒：三猫撒娇打断 hyperfocus。
      Use when: hook 触发提醒、用户输入 /hyperfocus-brake。
      Not for: 正常工作流程。
      Output: 三猫温柔提醒 + typed check-in。
    triggers:
      - "hyperfocus"
      - "休息提醒"
      - "健康检查"
      - "/hyperfocus-brake"
    next: []

  bootcamp-guide:
    description: >
      新手训练营引导模式：Phase 驱动的新手引导行为。
      Use when: 新手引导、训练营、第一次使用。
      Not for: 老用户日常对话。
      Output: 分阶段引导行为。
    triggers:
      - "bootcamp"
      - "训练营"
      - "我是新手"
      - "新手引导"
    next: ["feat-lifecycle"]

# === 铁律 ===
iron_laws:
  - id: no-self-review
    rule: "同一个体不能 review 自己的代码"
  - id: no-impersonation
    rule: "不能冒充其他猫，身份是硬约束"
